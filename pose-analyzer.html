<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RESPECT ATHLETIC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0c;
    --panel: rgba(10,10,14,0.85);
    --border: rgba(255,255,255,0.1);
    --accent: #00e5ff;
    --bad: #ff3d71;
    --good: #00e5a0;
    --warn: #ff9800;
    --text: #ffffff;
    --muted: rgba(255,255,255,0.5);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: #000;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  /* FULL SCREEN VIDEO */
  #video {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  #canvas {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 2;
  }

  /* HEADER OVERLAY */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 50px 20px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
  }
  .logo .r { color: var(--accent); }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.5);
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }
  .status-dot.live { background: var(--good); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-text { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); }

  /* METRICS OVERLAY - 화면 오른쪽 */
  .metrics-overlay {
    position: fixed;
    top: 120px;
    right: 12px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .metrics-overlay.visible { opacity: 1; }

  .metric-pill {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    backdrop-filter: blur(12px);
    min-width: 110px;
  }

  .metric-pill .m-label {
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .metric-pill .m-value {
    font-size: 20px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    line-height: 1.1;
  }

  .metric-pill .m-sub {
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    margin-top: 1px;
  }

  .metric-pill.good { border-left: 3px solid var(--good); }
  .metric-pill.warn { border-left: 3px solid var(--warn); }
  .metric-pill.bad  { border-left: 3px solid var(--bad); }

  /* 점프 상태 표시 - 화면 왼쪽 */
  .jump-status {
    position: fixed;
    top: 120px;
    left: 12px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .jump-status.visible { opacity: 1; }

  .jump-pill {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    backdrop-filter: blur(12px);
    min-width: 100px;
  }
  .jump-pill .j-label {
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .jump-pill .j-value {
    font-size: 18px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
  }

  /* 점프 페이즈 배지 */
  .phase-badge {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    background: rgba(0,229,255,0.15);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 10px 24px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.1em;
    display: none;
    backdrop-filter: blur(10px);
  }
  .phase-badge.show { display: block; animation: fadeInOut 1.5s forwards; }
  @keyframes fadeInOut { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.8)} 20%{opacity:1;transform:translate(-50%,-50%) scale(1)} 80%{opacity:1} 100%{opacity:0} }

  /* 부상 위험 경고 */
  .danger-alert {
    position: fixed;
    bottom: 160px;
    left: 12px; right: 12px;
    z-index: 10;
    background: rgba(255,61,113,0.2);
    border: 1.5px solid var(--bad);
    border-radius: 10px;
    padding: 10px 14px;
    backdrop-filter: blur(10px);
    display: none;
  }
  .danger-alert.show { display: flex; align-items: center; gap: 8px; }
  .danger-alert .d-icon { font-size: 18px; }
  .danger-alert .d-text { font-size: 12px; color: var(--bad); font-weight: 600; }

  /* REC 배지 */
  .rec-badge {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: var(--bad);
    color: #fff;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 20px;
    display: none;
    animation: pulse 1s infinite;
  }
  .rec-badge.visible { display: block; }

  /* 하단 버튼 영역 */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 16px 20px 40px;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* 액션 버튼들 */
  .action-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .action-row.visible { opacity: 1; }

  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    background: rgba(0,0,0,0.6);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 12px 22px;
    backdrop-filter: blur(10px);
    transition: all 0.15s;
  }
  .action-btn:active { transform: scale(0.92); }

  .action-btn .btn-icon { font-size: 24px; line-height: 1; }
  .action-btn .btn-label {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }

  .action-btn.capture { border-color: var(--accent); }
  .action-btn.capture .btn-label { color: var(--accent); }

  .action-btn.record { border-color: var(--bad); }
  .action-btn.record .btn-label { color: var(--bad); }
  .action-btn.record.recording {
    background: rgba(255,61,113,0.2);
    animation: recpulse 1s infinite;
  }
  @keyframes recpulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,61,113,0.3)} 50%{box-shadow:0 0 0 10px rgba(255,61,113,0)} }

  /* 시작 버튼 */
  .start-btn {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    padding: 16px 40px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(0,229,255,0.4);
  }
  .start-btn.hidden { display: none; }

  /* 코너 */
  .corner {
    position: fixed;
    width: 22px; height: 22px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.5;
    z-index: 5;
  }
  .corner.tl { top: 44px; left: 12px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 44px; right: 12px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 100px; left: 12px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 100px; right: 12px; border-width: 0 2px 2px 0; }

  /* 플래시 */
  .flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    transition: opacity 0.05s;
  }

  /* 로딩 */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 20px;
  }
  .loading-logo { font-family: 'Space Mono', monospace; font-size: 18px; color: var(--accent); letter-spacing: 0.2em; }
  .loading-bar { width: 180px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .loading-fill { height: 100%; background: var(--accent); width: 0%; animation: load 2.2s ease forwards; }
  @keyframes load { to { width: 100%; } }
  .loading-text { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--muted); }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">RESPECT ATHLETIC</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-text">AI 모델 로딩 중...</div>
</div>

<!-- VIDEO + CANVAS -->
<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>

<!-- CORNERS -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- HEADER -->
<div class="header">
  <div class="logo"><span class="r">RESPECT</span> ATHLETIC</div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">대기 중</div>
  </div>
</div>

<!-- REC 배지 -->
<div class="rec-badge" id="recBadge">● REC</div>

<!-- 왼쪽: 점프 분석 -->
<div class="jump-status" id="jumpStatus">
  <div class="jump-pill">
    <div class="j-label">JUMP COUNT</div>
    <div class="j-value" id="jumpCount">0</div>
  </div>
  <div class="jump-pill">
    <div class="j-label">AIR TIME</div>
    <div class="j-value" id="airTime">0.0s</div>
  </div>
  <div class="jump-pill">
    <div class="j-label">HEIGHT EST.</div>
    <div class="j-value" id="jumpHeight">0cm</div>
  </div>
</div>

<!-- 오른쪽: 관절 수치 -->
<div class="metrics-overlay" id="metricsOverlay">
  <div class="metric-pill" id="pill-knee">
    <div class="m-label">KNEE ANGLE</div>
    <div class="m-value" id="val-knee">--°</div>
    <div class="m-sub" id="sub-knee">감지 대기</div>
  </div>
  <div class="metric-pill" id="pill-hip">
    <div class="m-label">HIP TILT</div>
    <div class="m-value" id="val-hip">--°</div>
    <div class="m-sub" id="sub-hip">감지 대기</div>
  </div>
  <div class="metric-pill" id="pill-trunk">
    <div class="m-label">TRUNK LEAN</div>
    <div class="m-value" id="val-trunk">--°</div>
    <div class="m-sub" id="sub-trunk">감지 대기</div>
  </div>
  <div class="metric-pill" id="pill-sym">
    <div class="m-label">SYMMETRY</div>
    <div class="m-value" id="val-sym">--%</div>
    <div class="m-sub" id="sub-sym">좌우 대칭</div>
  </div>
  <div class="metric-pill" id="pill-land">
    <div class="m-label">LANDING</div>
    <div class="m-value" id="val-land">--°</div>
    <div class="m-sub" id="sub-land">착지 무릎각</div>
  </div>
</div>

<!-- 점프 페이즈 -->
<div class="phase-badge" id="phaseBadge"></div>

<!-- 부상 위험 경고 -->
<div class="danger-alert" id="dangerAlert">
  <div class="d-icon">⚠️</div>
  <div class="d-text" id="dangerText">착지 무릎 각도 위험</div>
</div>

<!-- 플래시 -->
<div class="flash" id="flash"></div>

<!-- 시작 버튼 -->
<button class="start-btn" id="startBtn" onclick="startCamera()">📷 분석 시작</button>

<!-- 하단 버튼 -->
<div class="bottom-bar">
  <div class="action-row" id="actionRow">
    <div class="action-btn capture" onclick="capturePhoto()">
      <div class="btn-icon">📸</div>
      <div class="btn-label">캡처</div>
    </div>
    <div class="action-btn record" id="recordBtn" onclick="toggleRecord()">
      <div class="btn-icon">🔴</div>
      <div class="btn-label" id="recordLabel">녹화</div>
    </div>
  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<script>
let smoothed = {};
let jumpCount = 0;
let isAirborne = false;
let airStart = 0;
let lastAirTime = 0;
let jumpHeightPx = 0;
let baselineHipY = null;
let minHipY = null;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let lastPhase = '';
let dangerTimer = null;
let frameH = 1;

function smooth(key, val, a = 0.25) {
  if (smoothed[key] === undefined) smoothed[key] = val;
  smoothed[key] = smoothed[key] * (1 - a) + val * a;
  return smoothed[key];
}

function calcAngle(a, b, c) {
  const ab = { x: a.x - b.x, y: a.y - b.y };
  const cb = { x: c.x - b.x, y: c.y - b.y };
  const dot = ab.x * cb.x + ab.y * cb.y;
  const mag = Math.sqrt((ab.x**2+ab.y**2)) * Math.sqrt((cb.x**2+cb.y**2));
  if (!mag) return 0;
  return Math.round(Math.acos(Math.max(-1, Math.min(1, dot/mag))) * 180 / Math.PI);
}

function showPhase(text) {
  if (text === lastPhase) return;
  lastPhase = text;
  const el = document.getElementById('phaseBadge');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => { el.classList.remove('show'); lastPhase = ''; }, 1500);
}

function showDanger(text) {
  const el = document.getElementById('dangerAlert');
  document.getElementById('dangerText').textContent = text;
  el.classList.add('show');
  if (dangerTimer) clearTimeout(dangerTimer);
  dangerTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function updatePill(id, value, unit, subText, status) {
  document.getElementById('val-' + id).textContent = value + unit;
  document.getElementById('sub-' + id).textContent = subText;
  const pill = document.getElementById('pill-' + id);
  pill.className = 'metric-pill ' + status;
}

function onResults(results) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  frameH = canvas.height;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) return;
  const lm = results.poseLandmarks;
  const W = canvas.width, H = canvas.height;

  // 관절 연결선
  const connections = [
    [11,12],[11,13],[13,15],[12,14],[14,16],
    [11,23],[12,24],[23,24],[23,25],[25,27],
    [24,26],[26,28],[27,29],[28,30]
  ];
  ctx.strokeStyle = 'rgba(0,229,255,0.6)';
  ctx.lineWidth = 2.5;
  connections.forEach(([a,b]) => {
    const pa = lm[a], pb = lm[b];
    if (pa.visibility > 0.4 && pb.visibility > 0.4) {
      ctx.beginPath();
      ctx.moveTo(pa.x*W, pa.y*H);
      ctx.lineTo(pb.x*W, pb.y*H);
      ctx.stroke();
    }
  });

  // 관절 점
  [11,12,13,14,15,16,23,24,25,26,27,28].forEach(i => {
    const p = lm[i];
    if (p.visibility > 0.4) {
      const isKey = [23,24,25,26].includes(i);
      ctx.beginPath();
      ctx.arc(p.x*W, p.y*H, isKey ? 7 : 4, 0, 2*Math.PI);
      ctx.fillStyle = [23,24].includes(i) ? '#ff3d71' : [25,26].includes(i) ? '#00e5a0' : 'rgba(0,229,255,0.9)';
      ctx.fill();
    }
  });

  // 무릎 각도 텍스트
  const lHip=lm[23], rHip=lm[24], lKnee=lm[25], rKnee=lm[26];
  const lAnkle=lm[27], rAnkle=lm[28], lSh=lm[11], rSh=lm[12];

  ctx.font = 'bold 13px Space Mono, monospace';
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(0,0,0,0.9)';
  ctx.shadowBlur = 5;

  if (lKnee.visibility > 0.4) {
    const ang = calcAngle(lHip, lKnee, lAnkle);
    ctx.fillText(ang + '°', lKnee.x*W + 10, lKnee.y*H);
  }
  if (rKnee.visibility > 0.4) {
    const ang = calcAngle(rHip, rKnee, rAnkle);
    ctx.fillText(ang + '°', rKnee.x*W + 10, rKnee.y*H);
  }
  ctx.shadowBlur = 0;

  // ── 점프 분석 ──
  const hipMidY = (lHip.y + rHip.y) / 2;
  const ankleAvgY = (lAnkle.y + rAnkle.y) / 2;
  const kneeAvgY = (lKnee.y + rKnee.y) / 2;

  // 바닥 감지: 발목이 낮을 때 (0.85 이상)
  const onGround = ankleAvgY > 0.80;

  if (onGround && baselineHipY === null) {
    baselineHipY = smooth('baseHip', hipMidY, 0.05);
  }

  if (baselineHipY !== null) {
    const liftRatio = baselineHipY - hipMidY; // 양수 = 위로 올라감

    if (!isAirborne && liftRatio > 0.06) {
      // 이륙
      isAirborne = true;
      airStart = Date.now();
      minHipY = hipMidY;
      showPhase('🚀 JUMP!');
      jumpCount++;
      document.getElementById('jumpCount').textContent = jumpCount;
    }

    if (isAirborne) {
      if (hipMidY < minHipY) minHipY = hipMidY;

      if (onGround && liftRatio < 0.03) {
        // 착지
        isAirborne = false;
        const airTime = (Date.now() - airStart) / 1000;
        lastAirTime = airTime;
        // 높이 추정 (물리공식: h = g*t²/8)
        const heightCm = Math.round(9.8 * airTime * airTime * 100 / 8);
        document.getElementById('airTime').textContent = airTime.toFixed(2) + 's';
        document.getElementById('jumpHeight').textContent = heightCm + 'cm';
        showPhase('착지');
        baselineHipY = null;
      }
    }
  }

  // ── 수치 계산 ──
  const kneeL = calcAngle(lHip, lKnee, lAnkle);
  const kneeR = calcAngle(rHip, rKnee, rAnkle);
  const kneeAvg = smooth('knee', (kneeL+kneeR)/2);

  const hipTilt = smooth('hip', Math.abs((lHip.y - rHip.y) * 100));

  const shMid = { x:(lSh.x+rSh.x)/2, y:(lSh.y+rSh.y)/2 };
  const hipMid = { x:(lHip.x+rHip.x)/2, y:(lHip.y+rHip.y)/2 };
  const dx = shMid.x - hipMid.x;
  const dy = shMid.y - hipMid.y;
  const trunkLean = smooth('trunk', Math.round(90 + Math.atan2(dx, -dy) * 180/Math.PI));

  const symmetry = Math.max(0, Math.round(100 - Math.abs(kneeL-kneeR) * 2));

  // 수치 업데이트
  const kneeSt = kneeAvg < 80 ? 'good' : kneeAvg < 120 ? 'warn' : 'bad';
  updatePill('knee', Math.round(kneeAvg), '°',
    kneeAvg < 80 ? '✓ 좋은 굽힘' : kneeAvg > 150 ? '더 굽히세요' : '적정 범위',
    kneeSt);

  updatePill('hip', Math.round(hipTilt), '',
    hipTilt < 5 ? '✓ 수평' : hipTilt < 15 ? '약간 기울음' : '⚠ 기울음 큼',
    hipTilt < 5 ? 'good' : hipTilt < 15 ? 'warn' : 'bad');

  updatePill('trunk', Math.round(trunkLean), '°',
    Math.abs(trunkLean-90) < 15 ? '✓ 수직' : '기울어짐',
    Math.abs(trunkLean-90) < 15 ? 'good' : 'warn');

  updatePill('sym', symmetry, '%',
    symmetry > 85 ? '✓ 대칭' : symmetry > 70 ? '약간 비대칭' : '⚠ 비대칭',
    symmetry > 85 ? 'good' : symmetry > 70 ? 'warn' : 'bad');

  // 착지 무릎각 (착지 순간)
  if (!isAirborne && onGround) {
    updatePill('land', Math.round(kneeAvg), '°',
      kneeAvg < 90 ? '✓ 안전 착지' : kneeAvg > 160 ? '⚠ 무릎 위험' : '보통',
      kneeAvg < 90 ? 'good' : kneeAvg > 160 ? 'bad' : 'warn');

    // 부상 위험 경고
    if (kneeAvg > 165) showDanger('⚠ 착지 시 무릎을 더 굽히세요!');
    if (symmetry < 60) showDanger('⚠ 착지 좌우 불균형 — 부상 위험!');
  }
}

// 캡처
function capturePhoto() {
  const flash = document.getElementById('flash');
  flash.style.opacity = '0.9';
  setTimeout(() => { flash.style.opacity = '0'; }, 120);

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const out = document.createElement('canvas');
  out.width = video.videoWidth || window.innerWidth;
  out.height = video.videoHeight || window.innerHeight;
  const ctx = out.getContext('2d');
  ctx.drawImage(video, 0, 0, out.width, out.height);
  ctx.drawImage(canvas, 0, 0, out.width, out.height);

  out.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'RESPECT_' + Date.now() + '.png';
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

// 녹화
function toggleRecord() {
  const btn = document.getElementById('recordBtn');
  const label = document.getElementById('recordLabel');
  const badge = document.getElementById('recBadge');

  if (!isRecording) {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const out = document.createElement('canvas');
    out.width = video.videoWidth || 480;
    out.height = video.videoHeight || 640;
    const ctx = out.getContext('2d');

    const stream = out.captureStream(30);
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'RESPECT_' + Date.now() + '.webm';
      a.click();
    };

    const draw = () => {
      if (!isRecording) return;
      ctx.drawImage(video, 0, 0, out.width, out.height);
      ctx.drawImage(canvas, 0, 0, out.width, out.height);
      requestAnimationFrame(draw);
    };

    mediaRecorder.start();
    draw();
    isRecording = true;
    btn.classList.add('recording');
    label.textContent = '정지';
    badge.classList.add('visible');
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.classList.remove('recording');
    label.textContent = '녹화';
    badge.classList.remove('visible');
  }
}

// 카메라 시작
async function startCamera() {
  const btn = document.getElementById('startBtn');
  btn.textContent = '연결 중...';
  btn.disabled = true;

  try {
    const pose = new Pose({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
    });
    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    pose.onResults(onResults);

    const video = document.getElementById('video');
    const camera = new Camera(video, {
      onFrame: async () => { await pose.send({ image: video }); },
      width: 720, height: 1280,
      facingMode: 'environment'
    });
    await camera.start();

    btn.classList.add('hidden');
    document.getElementById('statusDot').classList.add('live');
    document.getElementById('statusText').textContent = 'LIVE';
    document.getElementById('metricsOverlay').classList.add('visible');
    document.getElementById('jumpStatus').classList.add('visible');
    document.getElementById('actionRow').classList.add('visible');

  } catch (err) {
    btn.textContent = '다시 시도';
    btn.disabled = false;
  }
}

window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loadingOverlay').style.display = 'none';
  }, 2400);
});
</script>
